<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buổi 4 Bài 1</title>
</head>
<body width="100vw" height="100vh">
    <table width="100%" align="center">
        <tr>
            <td colspan="3">
                <br>
                <br>
                <br>
                <br>
            </td>
        </tr>
        <tr>
            <td width="10%"></td>
            <td width="80%">
                <form action="">
                    <table width="50%" border="1" align="center">
                        <tr>
                            <td colspan="2" align="center">
                                <h1>Đăng ký</h1>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                Full name
                            </td>
                            <td>
                                <input type="text" placeholder="Nhập Fullname" size="80">
                            </td>
                        </tr>
                        <tr>
                            <td>
                                Username
                            </td>
                            <td>
                                <input type="text" placeholder="Nhập tên"size="80">
                            </td>
                        </tr>
                        <tr>
                            <td>Password</td>
                            <td>
                                <input type="password" placeholder="Nhập mật khẩu"size="80">
                            </td>
                        </tr>
                        <tr>
                            <td>Nhập lại <br> Password</td>
                            <td>
                                <input type="password" placeholder="Nhập lại mật khẩu"size="80">
                            </td>
                        </tr>
                        <tr>
                            <td>Giới tính</td>
                            <td>
                                <input type="radio" name="gender" value="1" checked> Nam
                                <input type="radio" name="gender" value="0"> Nữ
                            </td>
                        </tr>
                        <tr>
                            <td>Ngày Sinh</td>
                            <td>
                                <select id="day" name="day">
                                    <option>Chọn Ngày</option>
                                    <option value="01">01</option>
                                    <option value="02">02</option>
                                    <option value="03">03</option>
                                    <option value="04">04</option>
                                    <option value="05">05</option>
                                    <option value="06">06</option>
                                    <option value="07">07</option>
                                    <option value="08">08</option>
                                    <option value="09">09</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                    <option value="12">12</option>
                                    <option value="13">13</option>
                                    <option value="14">14</option>
                                    <option value="15">15</option>
                                    <option value="16">16</option>
                                    <option value="17">17</option>
                                    <option value="18">18</option>
                                    <option value="19">19</option>
                                    <option value="20">20</option>
                                    <option value="21">21</option>
                                    <option value="22">22</option>
                                    <option value="23">23</option>
                                    <option value="24">24</option>
                                    <option value="25">25</option>
                                    <option value="26">26</option>
                                    <option value="27">27</option>
                                    <option value="28">28</option>
                                    <option value="29">29</option>
                                    <option value="30">30</option>
                                    <option value="31">31</option>
                                </select>
                                <select id="month" name="month">
                                    <option>Chọn Tháng</option>
                                    <option value="01">Tháng 1</option>
                                    <option value="02">Tháng 2</option>
                                    <option value="03">Tháng 3</option>
                                    <option value="04">Tháng 4</option>
                                    <option value="05">Tháng 5</option>
                                    <option value="06">Tháng 6</option>
                                    <option value="07">Tháng 7</option>
                                    <option value="08">Tháng 8</option>
                                    <option value="09">Tháng 9</option>
                                    <option value="10">Tháng 10</option>
                                    <option value="11">Tháng 11</option>
                                    <option value="12">Tháng 12</option>
                                </select>
                                <select id="year" name="year">
                                    
                                    <option>Chọn Năm</option>
                                    <option value="2000">Năm 2000</option>
                                    <option value="2001">Năm 2001</option>

                                    <option value="2006">Năm 2006</option>

                        </tr>
                        <tr>
                            <td>Địa chỉ</td>
                            <td>
                                <textarea name="" id="" cols="30" rows="5"></textarea>

                        </tr>
                        <tr>
                            <td>Avatar</td>
                            <td><input type="file"></td>
                        </tr>
                        <tr>
                            <td>Sở thích</td>
                            <td> 
                                <input type="checkbox"> Xem Phim
                                <input type="checkbox"> Thể thao
                                <input type="checkbox"> Web
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" align="center">
                                <button>Reset</button>
                                <button>Ok</button>
                            </td>
                        </tr>
                    </table>
                </form>
            
            </td>
            <td width="10%"></td>
        </tr>
        <tr>
            <td colspan="3">
                <br>
                <br>
                <br>
                <br>    
            </td>
        </tr>
    </table>

</html>
